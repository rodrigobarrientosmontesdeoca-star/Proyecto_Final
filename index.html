<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Dinero Cloud</title>

<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin: 50px auto;
    width: 350px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

ul {
    text-align: left;
}

.delete-btn {
    color: red;
    cursor: pointer;
    margin-left: 10px;
}
</style>

</head>
<body>

<div class="container">
    <h2>💸 Control de Dinero</h2>

    <input type="number" id="cantidad" placeholder="Cantidad">
    <br>

    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>

    <h3 id="total">Total: $0</h3>

    <h3>Historial</h3>
    <ul id="historial"></ul>
</div>

<!-- Firebase V8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 CAMBIA SOLO ESTA URL SI ES NECESARIO
const firebaseConfig = {
    databaseURL: "https://proyecto-final-2e4a8-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// REFERENCIAS
const totalRef = db.ref("app/total");
const historialRef = db.ref("app/historial");
const accionRef = db.ref("app/accion"); // 🔥 PARA ESP32

let totalActual = 0;


// 🔄 ACTUALIZAR TOTAL
totalRef.on("value", (snapshot) => {

    totalActual = snapshot.val() || 0;

    document.getElementById("total").innerText =
    "Total: $" + totalActual.toFixed(2);

});


// 🔄 ACTUALIZAR HISTORIAL
historialRef.on("value", (snapshot) => {

    const lista = document.getElementById("historial");
    lista.innerHTML = "";

    snapshot.forEach((child) => {

        const data = child.val();
        const key = child.key;

        const li = document.createElement("li");

        li.innerHTML = `
            ${data.tipo}: $${data.cantidad}
            <span class="delete-btn"
            onclick="eliminar('${key}')">
            ❌
            </span>
        `;

        lista.appendChild(li);

    });

});


// 💰 DEPOSITAR
function depositar() {

    let cantidad =
    parseFloat(document.getElementById("cantidad").value);

    if (isNaN(cantidad) || cantidad <= 0) {
        alert("Cantidad inválida");
        return;
    }

    totalActual += cantidad;
    totalRef.set(totalActual);

    historialRef.push({
        tipo: "Depósito",
        cantidad: cantidad,
        fecha: Date.now()
    });

    // 🔥 AVISO AL ESP32
    accionRef.set("deposito");

    document.getElementById("cantidad").value = "";
}


// 💸 RETIRAR
function retirar() {

    let cantidad =
    parseFloat(document.getElementById("cantidad").value);

    if (isNaN(cantidad) || cantidad <= 0) {
        alert("Cantidad inválida");
        return;
    }

    if (cantidad > totalActual) {
        alert("Fondos insuficientes");
        return;
    }

    totalActual -= cantidad;
    totalRef.set(totalActual);

    historialRef.push({
        tipo: "Retiro",
        cantidad: cantidad,
        fecha: Date.now()
    });

    // 🔥 AVISO AL ESP32
    accionRef.set("retiro");

    document.getElementById("cantidad").value = "";
}


// 🗑️ ELIMINAR TRANSACCIÓN
function eliminar(key) {

    if(confirm("¿Eliminar esta transacción?")) {
        historialRef.child(key).remove();
    }

}

</script>

</body>
</html>
