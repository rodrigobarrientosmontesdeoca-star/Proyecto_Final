<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Dinero con Firebase</title>

    <!-- Firebase SDK -->
    <script src="https://proyecto-final-2e4a8-default-rtdb.firebaseio.com"></script>
    <script src="lnR36eAFqYj3okpIqjvukBwynaEVWHOrdC6vAuaB"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        ul {
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Dinero</h2>

    <input type="number" id="cantidad" placeholder="Cantidad">

    <br>

    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>

    <div id="total">Total: $0</div>

    <h3>Historial</h3>
    <ul id="historial"></ul>
</div>

<script type="module">
    // 🔥 TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "XXXX",
        appId: "XXXX"
    };

    // Inicializar Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const totalRef = ref(db, "total");
    const historialRef = ref(db, "historial");

    // Escuchar cambios en total
    onValue(totalRef, (snapshot) => {
        let total = snapshot.val() || 0;
        document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
    });

    // Escuchar historial
    onValue(historialRef, (snapshot) => {
        let lista = document.getElementById("historial");
        lista.innerHTML = "";

        snapshot.forEach((child) => {
            let data = child.val();
            let item = document.createElement("li");
            item.textContent = data.tipo + ": $" + data.cantidad;
            lista.appendChild(item);
        });
    });

    // Obtener total actual
    async function obtenerTotal() {
        return new Promise((resolve) => {
            onValue(totalRef, (snapshot) => {
                resolve(snapshot.val() || 0);
            }, { onlyOnce: true });
        });
    }

    // Depositar
    window.depositar = async function () {
        let cantidad = parseFloat(document.getElementById("cantidad").value);

        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad inválida");
            return;
        }

        let total = await obtenerTotal();
        total += cantidad;

        set(totalRef, total);

        push(historialRef, {
            tipo: "Depósito",
            cantidad: cantidad.toFixed(2)
        });
    }

    // Retirar
    window.retirar = async function () {
        let cantidad = parseFloat(document.getElementById("cantidad").value);

        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad inválida");
            return;
        }

        let total = await obtenerTotal();

        if (cantidad > total) {
            alert("Fondos insuficientes");
            return;
        }

        total -= cantidad;

        set(totalRef, total);

        push(historialRef, {
            tipo: "Retiro",
            cantidad: cantidad.toFixed(2)
        });
    }
</script>

</body>
</html>
