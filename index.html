<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Dinero Cloud</title>

<style>
body{
margin:0;
background:#111827;
font-family:Arial,sans-serif;
color:white;
text-align:center;
}

.container{
width:420px;
margin:50px auto;
background:#1f2937;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h2{
font-size:32px;
margin-bottom:25px;
color:#60a5fa;
}

input{
width:80%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
margin-bottom:20px;
background:#374151;
color:white;
}

input::placeholder{
color:#cbd5e1;
}

button{
padding:12px 22px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:first-of-type{
background:#2563eb;
color:white;
}

button:last-of-type{
background:#ef4444;
color:white;
}

button:hover{
opacity:.9;
}

#total{
margin-top:25px;
background:#111827;
padding:20px;
border-radius:15px;
font-size:28px;
color:#22c55e;
}

h3{
margin-top:25px;
}

ul{
list-style:none;
padding:0;
text-align:left;
}

li{
background:#374151;
margin:10px 0;
padding:14px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#ef4444;
padding:5px 9px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}
</style>

</head>
<body>

<div class="container">
<h2>💸 Control de Dinero</h2>

<input type="number" id="cantidad" placeholder="Cantidad">
<br>

<button onclick="depositar()">Depositar</button>
<button onclick="retirar()">Retirar</button>

<h3 id="total">Total: $0</h3>

<h3>Historial</h3>
<ul id="historial"></ul>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
databaseURL:"https://proyecto-final-2e4a8-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const totalRef = db.ref("app/total");
const historialRef = db.ref("app/historial");
const accionRef = db.ref("app/accion");

let totalActual = 0;

totalRef.on("value",(snapshot)=>{
totalActual=snapshot.val()||0;

document.getElementById("total").innerText=
"Total: $" + totalActual.toFixed(2);

});

historialRef.on("value",(snapshot)=>{

const lista=document.getElementById("historial");
lista.innerHTML="";

snapshot.forEach((child)=>{

const data=child.val();
const key=child.key;

const li=document.createElement("li");

li.innerHTML=`
${data.tipo}: $${data.cantidad}
<span class="delete-btn"
onclick="eliminar('${key}')">
❌
</span>
`;

lista.appendChild(li);

});

});

function depositar(){

let cantidad=parseFloat(
document.getElementById("cantidad").value
);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

totalActual+=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Depósito",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("deposito");

document.getElementById("cantidad").value="";

}

function retirar(){

let cantidad=parseFloat(
document.getElementById("cantidad").value
);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

if(cantidad>totalActual){
alert("Fondos insuficientes");
return;
}

totalActual-=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Retiro",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("retiro");

document.getElementById("cantidad").value="";

}

function eliminar(key){

if(confirm("¿Eliminar esta transacción?")){
historialRef.child(key).remove();
}

}
</script>

</body>
</html>
