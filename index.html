<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
color:white;
}

.container{
width:420px;
max-width:100%;
background:rgba(255,255,255,0.12);
backdrop-filter: blur(14px);
padding:35px;
border-radius:30px;
box-shadow:
0 15px 40px rgba(0,0,0,.35);
text-align:center;
border:1px solid rgba(255,255,255,.15);
}

h2{
font-size:32px;
margin-bottom:25px;
font-weight:700;
}

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
margin-bottom:20px;
font-size:17px;
background:rgba(255,255,255,.15);
color:white;
}

input::placeholder{
color:#dbeafe;
}

button{
border:none;
padding:14px 24px;
margin:8px;
border-radius:14px;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

button:nth-of-type(1){
background:linear-gradient(45deg,#06b6d4,#2563eb);
color:white;
}

button:nth-of-type(2){
background:linear-gradient(45deg,#fb923c,#ef4444);
color:white;
}

#total{
margin-top:25px;
padding:22px;
border-radius:20px;
font-size:30px;
font-weight:700;
background:linear-gradient(
135deg,
rgba(34,197,94,.25),
rgba(59,130,246,.25)
);
}

h3{
margin-top:28px;
margin-bottom:15px;
}

ul{
list-style:none;
text-align:left;
max-height:250px;
overflow-y:auto;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.10);
margin-bottom:12px;
padding:14px 16px;
border-radius:14px;
box-shadow:0 5px 12px rgba(0,0,0,.15);
}

.delete-btn{
background:#ef4444;
padding:6px 10px;
border-radius:10px;
margin-left:10px;
cursor:pointer;
}

.delete-btn:hover{
background:#dc2626;
}

@media(max-width:500px){
.container{
width:95%;
padding:25px;
}

button{
width:100%;
margin:8px 0;
}
}
</style>
