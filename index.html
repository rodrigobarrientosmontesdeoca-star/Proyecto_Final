<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Dinero</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
        }
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
        #total {
            font-size: 20px;
            margin-top: 10px;
            font-weight: bold;
        }
        ul {
            text-align: left;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Dinero</h2>
    
    <input type="number" id="cantidad" placeholder="Ingresa cantidad">
    <br>
    
    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>
    
    <div id="total">Total: $0</div>
    
    <h3>Historial</h3>
    <ul id="historial"></ul>
</div>

<script>
    let total = 0;

    function depositar() {
        let cantidad = parseFloat(document.getElementById("cantidad").value);
        
        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Ingresa una cantidad válida");
            return;
        }

        total += cantidad;
        actualizarTotal();
        agregarHistorial("Depósito", cantidad);
    }

    function retirar() {
        let cantidad = parseFloat(document.getElementById("cantidad").value);

        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Ingresa una cantidad válida");
            return;
        }

        if (cantidad > total) {
            alert("No tienes suficiente dinero");
            return;
        }

        total -= cantidad;
        actualizarTotal();
        agregarHistorial("Retiro", cantidad);
    }

    function actualizarTotal() {
        document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
    }

    function agregarHistorial(tipo, cantidad) {
        let lista = document.getElementById("historial");
        let item = document.createElement("li");
        item.textContent = tipo + ": $" + cantidad.toFixed(2);
        lista.appendChild(item);
    }
</script>

</body>
</html>
