<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Dinero Cloud</title>

<style>
body{
margin:0;
padding:0;
background:#e8eef7;
font-family:Arial,sans-serif;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#1d4ed8;
font-size:30px;
margin-bottom:25px;
}

input{
width:85%;
padding:12px;
font-size:18px;
border:2px solid #93c5fd;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px 22px;
margin:8px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

button:first-of-type{
background:#2563eb;
color:white;
}

button:last-of-type{
background:#ef4444;
color:white;
}

#total{
background:#dbeafe;
padding:18px;
border-radius:12px;
color:#1e3a8a;
margin-top:20px;
font-size:28px;
}

h3{
color:#1e3a8a;
margin-top:25px;
}

ul{
list-style:none;
padding:0;
text-align:left;
}

li{
background:#f1f5f9;
margin:10px 0;
padding:12px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:red;
color:white;
padding:5px 8px;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
<h2>💸 Control de Dinero</h2>

<input type="number" id="cantidad" placeholder="Cantidad">
<br>

<button onclick="depositar()">Depositar</button>
<button onclick="retirar()">Retirar</button>

<h3 id="total">Total: $0</h3>

<h3>Historial</h3>
<ul id="historial"></ul>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
databaseURL: "https://proyecto-final-2e4a8-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const totalRef = db.ref("app/total");
const historialRef = db.ref("app/historial");
const accionRef = db.ref("app/accion");

let totalActual = 0;

totalRef.on("value",(snapshot)=>{
totalActual = snapshot.val() || 0;
document.getElementById("total").innerText =
"Total: $" + totalActual.toFixed(2);
});

historialRef.on("value",(snapshot)=>{
const lista=document.getElementById("historial");
lista.innerHTML="";

snapshot.forEach((child)=>{
const data=child.val();
const key=child.key;

const li=document.createElement("li");

li.innerHTML=`
${data.tipo}: $${data.cantidad}
<span class="delete-btn" onclick="eliminar('${key}')">❌</span>
`;

lista.appendChild(li);
});
});

function depositar(){

let cantidad=parseFloat(
document.getElementById("cantidad").value
);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

totalActual+=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Depósito",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("deposito");

document.getElementById("cantidad").value="";
}

function retirar(){

let cantidad=parseFloat(
document.getElementById("cantidad").value
);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

if(cantidad>totalActual){
alert("Fondos insuficientes");
return;
}

totalActual-=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Retiro",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("retiro");

document.getElementById("cantidad").value="";
}

function eliminar(key){
if(confirm("¿Eliminar esta transacción?")){
historialRef.child(key).remove();
}
}
</script>

</body>
</html>
