<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Dinero Cloud</title>

<style>
    body {
        background: #0b0b0b;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    .container {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        margin: 50px auto;
        width: 350px;
        border-radius: 10px;
    }

    input, button {
        padding: 10px;
        margin: 5px;
    }

    ul {
        text-align: left;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Control de Dinero 💸</h2>

    <input type="number" id="cantidad" placeholder="Cantidad">

    <br>

    <button onclick="depositar()">Depositar</button>
    <button onclick="retirar()">Retirar</button>

    <h3 id="total">Total: $0</h3>

    <h3>Historial</h3>
    <ul id="historial"></ul>
</div>

<!-- Firebase V8 (igual que tu ejemplo) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 🔥 SOLO CAMBIA ESTO SI TU URL ES DIFERENTE
    const firebaseConfig = {
        databaseURL: "https://proyecto-final-2e4a8-default-rtdb.firebaseio.com
"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // REFERENCIAS
    const totalRef = db.ref("dinero/total");
    const historialRef = db.ref("dinero/historial");

    // 🔥 LEER TOTAL EN TIEMPO REAL
    totalRef.on("value", (snapshot) => {
        let total = snapshot.val() || 0;
        document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
    });

    // 🔥 LEER HISTORIAL
    historialRef.on("value", (snapshot) => {
        const lista = document.getElementById("historial");
        lista.innerHTML = "";

        snapshot.forEach((child) => {
            const data = child.val();

            const li = document.createElement("li");
            li.textContent = data.tipo + ": $" + data.cantidad;

            lista.appendChild(li);
        });
    });

    // 🔥 DEPOSITAR
    function depositar() {
        let cantidad = parseFloat(document.getElementById("cantidad").value);

        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad inválida");
            return;
        }

        totalRef.once("value", (snapshot) => {
            let total = snapshot.val() || 0;
            total += cantidad;

            totalRef.set(total);

            historialRef.push({
                tipo: "Depósito",
                cantidad: cantidad,
                fecha: Date.now()
            });
        });
    }

    // 🔥 RETIRAR
    function retirar() {
        let cantidad = parseFloat(document.getElementById("cantidad").value);

        if (isNaN(cantidad) || cantidad <= 0) {
            alert("Cantidad inválida");
            return;
        }

        totalRef.once("value", (snapshot) => {
            let total = snapshot.val() || 0;

            if (cantidad > total) {
                alert("Fondos insuficientes");
                return;
            }

            total -= cantidad;

            totalRef.set(total);

            historialRef.push({
                tipo: "Retiro",
                cantidad: cantidad,
                fecha: Date.now()
            });
        });
    }
</script>

</body>
</html>
