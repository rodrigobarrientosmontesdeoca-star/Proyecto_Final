<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
overflow:hidden;
position:relative;
}

/* fondo decorativo */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:#38bdf8;
filter:blur(180px);
top:-150px;
left:-120px;
opacity:.35;
}

body::after{
content:'';
position:absolute;
width:450px;
height:450px;
background:#8b5cf6;
filter:blur(180px);
bottom:-150px;
right:-100px;
opacity:.35;
}

.container{
position:relative;
z-index:2;
width:420px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 20px 60px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.1);
text-align:center;
color:white;
}

/* titulo */
h2{
font-size:32px;
font-weight:700;
margin-bottom:25px;
letter-spacing:1px;
background:linear-gradient(to right,#67e8f9,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* input */
input{
width:100%;
padding:16px 18px;
margin-bottom:20px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.12);
color:white;
font-size:17px;
box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
transition:.3s;
}

input:focus{
transform:scale(1.02);
background:rgba(255,255,255,.18);
box-shadow:0 0 18px rgba(56,189,248,.35);
}

input::placeholder{
color:#cbd5e1;
}

/* botones */
button{
border:none;
padding:14px 28px;
margin:8px;
border-radius:16px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
letter-spacing:.5px;
}

button:nth-of-type(1){
background:linear-gradient(135deg,#06b6d4,#2563eb);
color:white;
box-shadow:0 8px 20px rgba(37,99,235,.4);
}

button:nth-of-type(2){
background:linear-gradient(135deg,#f97316,#ef4444);
color:white;
box-shadow:0 8px 20px rgba(239,68,68,.35);
}

button:hover{
transform:translateY(-3px) scale(1.03);
}

button:active{
transform:scale(.97);
}

/* tarjeta total */
#total{
margin-top:28px;
padding:22px;
border-radius:22px;
background:linear-gradient(
135deg,
rgba(34,197,94,.18),
rgba(59,130,246,.15)
);
border:1px solid rgba(255,255,255,.1);
font-size:30px;
font-weight:700;
box-shadow:0 8px 30px rgba(0,0,0,.25);
}

/* historial */
h3{
margin-top:28px;
margin-bottom:15px;
font-size:22px;
font-weight:600;
}

ul{
list-style:none;
max-height:280px;
overflow-y:auto;
padding-right:8px;
}

/* scroll */
ul::-webkit-scrollbar{
width:6px;
}
ul::-webkit-scrollbar-thumb{
background:#6366f1;
border-radius:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
margin-bottom:12px;
border-radius:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 4px 15px rgba(0,0,0,.18);
font-size:16px;
transition:.3s;
}

li:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.12);
}

/* boton eliminar */
.delete-btn{
margin-left:15px;
background:#ef4444;
padding:6px 10px;
border-radius:10px;
color:white;
transition:.25s;
}

.delete-btn:hover{
background:#dc2626;
transform:scale(1.1);
}

/* responsive */
@media(max-width:500px){

.container{
width:92%;
padding:28px;
}

button{
width:100%;
margin:8px 0;
}

#total{
font-size:24px;
}
}
</style>
