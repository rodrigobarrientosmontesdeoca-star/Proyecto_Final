<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Dinero Cloud</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
background:#ffffff;
width:420px;
max-width:100%;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.30);
text-align:center;
}

h2{
color:#1e3c72;
font-size:32px;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:2px solid #dbeafe;
border-radius:12px;
outline:none;
margin-bottom:20px;
}

input:focus{
border-color:#2563eb;
}

button{
border:none;
padding:14px 25px;
margin:8px;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

button:nth-of-type(1){
background:#2563eb;
color:white;
}

button:nth-of-type(2){
background:#ef4444;
color:white;
}

#total{
margin-top:25px;
background:#eff6ff;
color:#1e3c72;
padding:20px;
border-radius:15px;
font-size:30px;
font-weight:bold;
}

h3{
margin-top:30px;
margin-bottom:15px;
color:#1e3c72;
}

ul{
list-style:none;
text-align:left;
max-height:260px;
overflow-y:auto;
padding:0;
}

li{
background:#f8fafc;
margin-bottom:12px;
padding:14px 15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:5px solid #2563eb;
}

.delete-btn{
background:#ef4444;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:14px;
margin-left:10px;
cursor:pointer;
}

.delete-btn:hover{
background:#dc2626;
}

@media(max-width:500px){
.container{
width:95%;
padding:25px;
}

button{
display:block;
width:100%;
margin:10px 0;
}
}
</style>
</head>
<body>

<div class="container">
<h2>💸 Control de Dinero</h2>

<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="depositar()">Depositar</button>
<button onclick="retirar()">Retirar</button>

<h3 id="total">Total: $0</h3>

<h3>Historial</h3>
<ul id="historial"></ul>

</div>

<!-- Firebase V8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
databaseURL: "https://proyecto-final-2e4a8-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const totalRef = db.ref("app/total");
const historialRef = db.ref("app/historial");
const accionRef = db.ref("app/accion");

let totalActual = 0;

/* Actualizar total */
totalRef.on("value",(snapshot)=>{
totalActual = snapshot.val() || 0;
document.getElementById("total").innerText =
"Total: $" + totalActual.toFixed(2);
});

/* Actualizar historial */
historialRef.on("value",(snapshot)=>{

const lista=document.getElementById("historial");
lista.innerHTML="";

snapshot.forEach((child)=>{

const data=child.val();
const key=child.key;

const li=document.createElement("li");

li.innerHTML=`
${data.tipo}: $${data.cantidad}
<span class="delete-btn"
onclick="eliminar('${key}')">
❌
</span>
`;

lista.appendChild(li);

});

});

/* Depositar */
function depositar(){

let cantidad=
parseFloat(document.getElementById("cantidad").value);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

totalActual+=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Depósito",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("deposito");

document.getElementById("cantidad").value="";

}

/* Retirar */
function retirar(){

let cantidad=
parseFloat(document.getElementById("cantidad").value);

if(isNaN(cantidad)||cantidad<=0){
alert("Cantidad inválida");
return;
}

if(cantidad>totalActual){
alert("Fondos insuficientes");
return;
}

totalActual-=cantidad;
totalRef.set(totalActual);

historialRef.push({
tipo:"Retiro",
cantidad:cantidad,
fecha:Date.now()
});

accionRef.set("retiro");

document.getElementById("cantidad").value="";

}

/* Eliminar */
function eliminar(key){

if(confirm("¿Eliminar esta transacción?")){
historialRef.child(key).remove();
}

}
</script>

</body>
</html>
